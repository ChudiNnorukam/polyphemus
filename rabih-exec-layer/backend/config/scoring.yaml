# Execution Graph Scoring Configuration
# Edit this file to tune classification logic without code changes.
# Re-scored every 6 hours by the scoring cron.

classification:
  on_track:
    max_high_risks: 0
    max_overdue_commitments: 0
    max_blocked_dependencies: 0

  at_risk:
    has_high_risks_with_owner: true
    max_overdue_commitments: 2
    max_blocked_dependencies: 1

  failing:
    has_unowned_risks: true
    has_conflicting_decisions: true
    min_overdue_commitments: 3
    min_blocked_dependencies: 2

weights:
  unowned_risk: 10
  high_risk_owned: 3
  medium_risk: 1
  overdue_commitment: 5
  blocked_dependency: 7
  conflicting_decision: 8
  stale_thread_days: 1

thresholds:
  at_risk_score: 10
  failing_score: 25

extraction:
  confidence_min: 0.70
  prompt_version: "v2.0"

rescore_interval_hours: 6
