<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Agent Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid #27272a; }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  #last-updated { font-size: 12px; color: #a1a1aa; font-family: 'SF Mono', 'Fira Code', monospace; }

  .diagram-wrap { display: flex; justify-content: center; padding: 24px 16px 8px; }
  svg text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  /* Agent node rects */
  .agent-rect { fill: #18181b; stroke-width: 2; rx: 8; cursor: pointer; transition: fill 0.3s; }
  .agent-rect:hover { fill: #27272a; }
  .agent-rect.healthy { stroke: #34d399; }
  .agent-rect.stale   { stroke: #fbbf24; }
  .agent-rect.critical { stroke: #f87171; }
  .agent-rect.never, .agent-rect.no_data { stroke: #3f3f46; }

  /* Glow filter */
  .glow-green  { filter: drop-shadow(0 0 6px rgba(52,211,153,0.5)); }
  .glow-amber  { filter: drop-shadow(0 0 6px rgba(251,191,36,0.4)); }
  .glow-red    { filter: drop-shadow(0 0 6px rgba(248,113,113,0.5)); }

  /* System node rects */
  .sys-rect { fill: #18181b; stroke: #3f3f46; stroke-width: 1.5; rx: 6; }

  /* Labels */
  .agent-label { font-size: 13px; font-weight: 600; fill: #fafafa; text-anchor: middle; pointer-events: none; }
  .agent-sub   { font-size: 9px; fill: #a1a1aa; text-anchor: middle; pointer-events: none; }
  .sys-label   { font-size: 10px; fill: #a1a1aa; text-anchor: middle; pointer-events: none; }
  .sys-icon    { font-size: 14px; text-anchor: middle; pointer-events: none; }

  /* Edge lines */
  .edge-line { stroke: #27272a; stroke-width: 1.2; fill: none; }
  .edge-line.active { stroke: #3f3f46; }

  /* Animated pulse dots */
  .pulse-dot { r: 3; opacity: 0; }
  .pulse-dot.active { opacity: 1; }
  .pulse-dot.healthy { fill: #34d399; }
  .pulse-dot.stale   { fill: #fbbf24; }
  .pulse-dot.critical { fill: #f87171; }

  @keyframes dash-flow {
    0%   { stroke-dashoffset: 16; }
    100% { stroke-dashoffset: 0; }
  }
  .edge-line.active {
    stroke-dasharray: 4 4;
    animation: dash-flow 1s linear infinite;
  }

  /* Status cards */
  .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 8px 24px 12px; }
  .card { background: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 14px 16px; }
  .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .card-title { font-size: 13px; font-weight: 600; }
  .card-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
  .badge-healthy  { background: #064e3b; color: #34d399; }
  .badge-stale    { background: #451a03; color: #fbbf24; }
  .badge-critical { background: #450a0a; color: #f87171; }
  .badge-never, .badge-no_data { background: #27272a; color: #71717a; }
  .card-row { display: flex; justify-content: space-between; font-size: 12px; padding: 2px 0; }
  .card-row .label { color: #a1a1aa; }
  .card-row .value { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; }
  .card-insight { font-size: 11px; color: #60a5fa; margin-top: 8px; line-height: 1.4; font-style: italic; }

  /* Inter-agent message edges (Level 3) */
  .msg-edge { stroke-width: 1.5; fill: none; stroke-dasharray: 6 3; }
  .msg-edge.urgent { stroke: #f87171; }
  .msg-edge.normal { stroke: #60a5fa; }
  .msg-edge.fyi    { stroke: #3f3f46; }
  @keyframes msg-pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
  .msg-edge.active { animation: msg-pulse 1.5s ease-in-out infinite; }
  .msg-dot { r: 4; }
  .msg-dot.urgent { fill: #f87171; }
  .msg-dot.normal { fill: #60a5fa; }

  /* Message badge on agent nodes */
  .msg-badge-bg { fill: #f87171; }
  .msg-badge-text { font-size: 9px; fill: #fff; font-weight: 700; text-anchor: middle; dominant-baseline: central; }

  /* Trend arrow (Level 1) */
  .trend-arrow { font-size: 12px; font-weight: 700; pointer-events: none; }
  .trend-up   { fill: #f87171; }
  .trend-down { fill: #34d399; }
  .trend-flat { fill: #a1a1aa; }

  /* Heatmap strip (Level 1) */
  .heatmap-cell { rx: 1; }
  .hm-green { fill: #065f46; }
  .hm-amber { fill: #78350f; }
  .hm-red   { fill: #7f1d1d; }
  .hm-empty { fill: #18181b; stroke: #27272a; stroke-width: 0.5; }

  /* Accuracy gauge (Level 2) */
  .acc-track { fill: none; stroke: #27272a; stroke-width: 3; }
  .acc-fill  { fill: none; stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.5s; }
  .acc-text  { font-size: 8px; fill: #a1a1aa; text-anchor: middle; dominant-baseline: central; }

  /* Overall status pill in header */
  #overall-pill { font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: 600; }
  #overall-pill.healthy  { background: #064e3b; color: #34d399; }
  #overall-pill.stale    { background: #451a03; color: #fbbf24; }
  #overall-pill.critical { background: #450a0a; color: #f87171; }
  #overall-pill.unknown  { background: #27272a; color: #71717a; }

  /* Executive Briefing panel */
  #briefing { background: #141820; border-left: 3px solid #60a5fa; border-radius: 6px; margin: 0 24px 12px; padding: 14px 18px; }
  #briefing h2 { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 10px; }
  .brief-item { font-size: 12px; line-height: 1.6; margin-bottom: 4px; }
  .brief-agent { color: #34d399; font-weight: 600; }
  .brief-text  { color: #d4d4d8; }
  .brief-action { font-size: 12px; margin-top: 10px; color: #60a5fa; }

  /* Lessons panel (replaces ticker) */
  .lessons-panel { padding: 8px 24px 10px; border-top: 1px solid #1a1a1e; }
  .lessons-panel h3 { font-size: 12px; font-weight: 600; color: #a1a1aa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .lesson-item { font-size: 12px; line-height: 1.5; margin-bottom: 4px;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .lesson-agent { color: #34d399; font-weight: 600; }
  .lesson-text  { color: #9ca3af; }

  /* Task queue panel (Level 3) */
  .task-panel { padding: 0 24px 12px; }
  .task-panel h3 { font-size: 12px; font-weight: 600; color: #a1a1aa; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .task-row { display: flex; align-items: center; gap: 8px; font-size: 11px; padding: 4px 8px; background: #18181b; border: 1px solid #27272a; border-radius: 4px; margin-bottom: 4px; }
  .task-priority { font-size: 9px; padding: 1px 6px; border-radius: 8px; font-weight: 600; background: #27272a; color: #a1a1aa; }
  .task-priority.p1, .task-priority.p2 { background: #450a0a; color: #f87171; }
  .task-priority.p3, .task-priority.p4 { background: #451a03; color: #fbbf24; }
  .task-agent { color: #34d399; font-weight: 600; min-width: 30px; }
  .task-text { color: #d4d4d8; flex: 1; }
  .task-status { font-size: 9px; padding: 1px 6px; border-radius: 8px; }
  .task-status.pending { background: #1e3a5f; color: #60a5fa; }
  .task-status.done { background: #064e3b; color: #34d399; }

  /* Pipeline bar */
  .pipeline { display: flex; gap: 24px; justify-content: center; padding: 10px 24px 12px; }
  .pipe-stat { font-size: 12px; color: #a1a1aa; }
  .pipe-stat span { color: #fafafa; font-family: 'SF Mono', 'Fira Code', monospace; font-weight: 600; }

  /* Tooltip */
  #tooltip { display: none; position: fixed; background: #27272a; border: 1px solid #3f3f46; border-radius: 8px; padding: 12px 14px; max-width: 300px; z-index: 100; pointer-events: none; }
  #tip-agent { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  #tip-meta { font-size: 11px; color: #a1a1aa; line-height: 1.5; }
  #tip-insight { font-size: 11px; color: #60a5fa; margin-top: 6px; font-style: italic; line-height: 1.4; }

  @media (max-width: 800px) {
    .cards { grid-template-columns: repeat(2, 1fr); }
    .pipeline { flex-wrap: wrap; gap: 12px; }
  }
</style>
</head>
<body>
  <header>
    <h1>OpenClaw Agent Dashboard</h1>
    <span id="overall-pill" class="unknown">LOADING</span>
    <span id="last-updated">Loading...</span>
  </header>

  <div id="briefing"><h2>Today's Briefing</h2><div id="briefing-body"></div></div>

  <div class="diagram-wrap">
    <svg id="diagram" viewBox="0 0 900 380" width="900" height="380"></svg>
  </div>

  <div class="cards" id="cards"></div>
  <div class="task-panel" id="task-panel"></div>
  <div class="lessons-panel" id="lessons-panel"></div>
  <div class="pipeline" id="pipeline-bar"></div>
  <div id="tooltip"><div id="tip-agent"></div><div id="tip-meta"></div><div id="tip-insight"></div></div>

<script>
const svg = document.getElementById('diagram');
const NS = 'http://www.w3.org/2000/svg';

// ── Node definitions ──────────────────────────────────────────────
const AGENTS = {
  cmo: { x: 200, y: 100, w: 110, h: 50, label: 'CMO', sub: '5-lens marketing' },
  ceo: { x: 590, y: 100, w: 110, h: 50, label: 'CEO', sub: '4-lens strategy' },
  coo: { x: 200, y: 320, w: 110, h: 50, label: 'COO', sub: '4-lens ops' },
  cto: { x: 590, y: 320, w: 110, h: 50, label: 'CTO', sub: '4-lens tech' },
};

const SYSTEMS = {
  db:       { x: 395, y: 200, w: 110, h: 44, label: 'SQLite DB', icon: 'DB' },
  vps:      { x: 395, y: 340, w: 100, h: 40, label: 'Server', icon: 'VPS' },
  slack:    { x: 60,  y: 210, w: 90,  h: 36, label: 'Slack', icon: 'Slack' },
  anthropic:{ x: 395, y: 60,  w: 110, h: 36, label: 'Anthropic', icon: 'AI' },
  apis:     { x: 750, y: 210, w: 90,  h: 36, label: 'Ext APIs', icon: 'API' },
};

// ── Edges: [sourceId, targetId, agentId (for activation)] ─────────
const EDGES = [
  ['cmo', 'db',        'cmo'],
  ['cmo', 'slack',     'cmo'],
  ['cmo', 'anthropic', 'cmo'],
  ['cmo', 'apis',      'cmo'],
  ['ceo', 'db',        'ceo'],
  ['ceo', 'slack',     'ceo'],
  ['ceo', 'anthropic', 'ceo'],
  ['ceo', 'vps',       'ceo'],
  ['coo', 'db',        'coo'],
  ['coo', 'slack',     'coo'],
  ['coo', 'vps',       'coo'],
  ['cto', 'db',        'cto'],
  ['cto', 'slack',     'cto'],
  ['cto', 'anthropic', 'cto'],
  ['cto', 'vps',       'cto'],
];

// Level 3: Inter-agent message edges (CEO hub-spoke)
const MSG_EDGES = [
  ['ceo', 'cmo'],
  ['ceo', 'cto'],
  ['ceo', 'coo'],
];

const AGENT_NAMES = { cmo: 'CMO Engine', cto: 'CTO Engine', ceo: 'CEO Engine', coo: 'COO Engine' };
let latestData = null;
let latestTrends = null;
let latestReflections = null;
let latestMessages = null;
let latestBriefing = null;

// ── SVG helpers ───────────────────────────────────────────────────
function el(tag, attrs) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs || {})) e.setAttribute(k, v);
  return e;
}

function cx(n) { return n.x + n.w / 2; }
function cy(n) { return n.y + n.h / 2; }

function edgePath(src, tgt) {
  const x1 = cx(src), y1 = cy(src), x2 = cx(tgt), y2 = cy(tgt);
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  return `M${x1},${y1} Q${mx},${y1} ${mx},${my} Q${mx},${y2} ${x2},${y2}`;
}

// ── Render static elements ────────────────────────────────────────
function renderEdges() {
  const g = el('g', { id: 'edges-group' });
  EDGES.forEach(([srcId, tgtId, agentId], i) => {
    const src = AGENTS[srcId] || SYSTEMS[srcId];
    const tgt = AGENTS[tgtId] || SYSTEMS[tgtId];
    const d = edgePath(src, tgt);
    const line = el('path', { d, class: 'edge-line', 'data-agent': agentId, 'data-idx': i });
    g.appendChild(line);
    const dot = el('circle', { r: '3', class: 'pulse-dot', 'data-agent': agentId, 'data-idx': i });
    g.appendChild(dot);
  });
  svg.appendChild(g);
}

function renderNodes() {
  // System nodes first (behind agents)
  for (const [id, n] of Object.entries(SYSTEMS)) {
    const g = el('g', { 'data-sys': id });
    g.appendChild(el('rect', { x: n.x, y: n.y, width: n.w, height: n.h, class: 'sys-rect' }));
    g.appendChild(Object.assign(el('text', { x: cx(n), y: n.y + n.h / 2 - 3, class: 'sys-icon' }), { textContent: n.icon }));
    g.appendChild(Object.assign(el('text', { x: cx(n), y: n.y + n.h / 2 + 10, class: 'sys-label' }), { textContent: n.label }));
    svg.appendChild(g);
  }
  // Agent nodes
  for (const [id, n] of Object.entries(AGENTS)) {
    const g = el('g', { 'data-agent': id, class: 'agent-group' });
    g.appendChild(el('rect', { x: n.x, y: n.y, width: n.w, height: n.h, class: 'agent-rect never', 'data-agent': id }));
    g.appendChild(Object.assign(el('text', { x: cx(n), y: n.y + n.h / 2 - 4, class: 'agent-label' }), { textContent: n.label }));
    g.appendChild(Object.assign(el('text', { x: cx(n), y: n.y + n.h / 2 + 10, class: 'agent-sub' }), { textContent: n.sub }));
    g.addEventListener('mouseenter', (e) => showTooltip(e, id));
    g.addEventListener('mousemove', moveTooltip);
    g.addEventListener('mouseleave', hideTooltip);
    svg.appendChild(g);
  }
}

// ── Level 3: Inter-agent message edges ────────────────────────────
function renderMsgEdges() {
  const g = el('g', { id: 'msg-edges-group' });
  MSG_EDGES.forEach(([srcId, tgtId], i) => {
    const src = AGENTS[srcId], tgt = AGENTS[tgtId];
    const d = edgePath(src, tgt);
    const line = el('path', { d, class: 'msg-edge', 'data-msg-idx': i, opacity: '0' });
    g.appendChild(line);
    const dot = el('circle', { r: '4', class: 'msg-dot', 'data-msg-idx': i, opacity: '0' });
    g.appendChild(dot);
  });
  svg.insertBefore(g, svg.querySelector('#edges-group'));
}

// ── Level 1: Trend arrows + heatmap on agent nodes ───────────────
function updateTrendOverlays(trends) {
  // Remove old overlays
  svg.querySelectorAll('.trend-arrow, .heatmap-cell, .acc-track, .acc-fill, .acc-text, .msg-badge-bg, .msg-badge-text').forEach(e => e.remove());

  for (const [id, n] of Object.entries(AGENTS)) {
    const t = trends?.[id];
    if (!t || t.trend === 'no_data') continue;

    // Trend arrow (top-right of node)
    const arrowChar = t.trend === 'up' ? '\u2191' : t.trend === 'down' ? '\u2193' : '\u2192';
    const arrowClass = 'trend-' + t.trend;
    const arrow = Object.assign(
      el('text', { x: n.x + n.w - 4, y: n.y - 4, class: `trend-arrow ${arrowClass}` }),
      { textContent: arrowChar }
    );
    svg.appendChild(arrow);

    // Heatmap strip (below node)
    const hm = t.heatmap || [];
    const cellW = 7, cellH = 5, gap = 1;
    const totalW = hm.length * (cellW + gap);
    const startX = cx(n) - totalW / 2;
    const startY = n.y + n.h + 4;
    hm.forEach((cell, ci) => {
      const cls = cell.level === 'red' ? 'hm-red' : cell.level === 'amber' ? 'hm-amber' : 'hm-green';
      svg.appendChild(el('rect', {
        x: startX + ci * (cellW + gap), y: startY, width: cellW, height: cellH,
        class: `heatmap-cell ${cls}`
      }));
    });
    // Fill empty slots to 14
    for (let ci = hm.length; ci < 14; ci++) {
      svg.appendChild(el('rect', {
        x: startX + ci * (cellW + gap), y: startY, width: cellW, height: cellH,
        class: 'heatmap-cell hm-empty'
      }));
    }
  }
}

// ── Level 2: Accuracy gauges ─────────────────────────────────────
function updateAccuracyGauges(reflections) {
  const accuracy = reflections?.accuracy || {};
  for (const [id, n] of Object.entries(AGENTS)) {
    const acc = accuracy[id];
    if (!acc) continue;

    const gaugeX = n.x - 16, gaugeY = n.y + 10, r = 10;
    const circumference = 2 * Math.PI * r;
    const pct = acc.avg;
    const color = pct >= 0.7 ? '#34d399' : pct >= 0.4 ? '#fbbf24' : '#f87171';

    svg.appendChild(el('circle', { cx: gaugeX, cy: gaugeY, r, class: 'acc-track' }));
    const fill = el('circle', { cx: gaugeX, cy: gaugeY, r, class: 'acc-fill',
      stroke: color, 'stroke-dasharray': circumference,
      'stroke-dashoffset': circumference * (1 - pct),
      transform: `rotate(-90 ${gaugeX} ${gaugeY})`
    });
    svg.appendChild(fill);
    svg.appendChild(Object.assign(
      el('text', { x: gaugeX, y: gaugeY, class: 'acc-text' }),
      { textContent: `${Math.round(pct * 100)}%` }
    ));
  }
}

// ── Level 3: Message badges + edge activation ────────────────────
function updateMessageOverlays(msgData) {
  if (!msgData) return;
  const messages = msgData.messages || [];

  // Count unread per agent
  const unread = {};
  messages.forEach(m => {
    if (!m.read_at) {
      unread[m.to_agent] = (unread[m.to_agent] || 0) + 1;
    }
  });

  // Render badges
  for (const [id, n] of Object.entries(AGENTS)) {
    if (!unread[id]) continue;
    const bx = n.x + n.w - 6, by = n.y - 2;
    svg.appendChild(el('circle', { cx: bx, cy: by, r: 7, class: 'msg-badge-bg' }));
    svg.appendChild(Object.assign(
      el('text', { x: bx, y: by, class: 'msg-badge-text' }),
      { textContent: unread[id] }
    ));
  }

  // Activate message edges if recent messages exist
  const recentMessages = messages.filter(m => {
    const age = (Date.now() - new Date(m.created_at + 'Z').getTime()) / 3600000;
    return age < 24;
  });

  MSG_EDGES.forEach(([srcId, tgtId], i) => {
    const line = svg.querySelector(`.msg-edge[data-msg-idx="${i}"]`);
    const dot = svg.querySelector(`.msg-dot[data-msg-idx="${i}"]`);
    const hasMsg = recentMessages.some(m =>
      (m.from_agent === srcId && m.to_agent === tgtId) ||
      (m.from_agent === tgtId && m.to_agent === srcId)
    );
    const priority = recentMessages.find(m =>
      (m.from_agent === srcId && m.to_agent === tgtId) ||
      (m.from_agent === tgtId && m.to_agent === srcId)
    )?.priority || 'normal';

    if (line) {
      line.setAttribute('opacity', hasMsg ? '1' : '0');
      line.classList.remove('urgent', 'normal', 'fyi', 'active');
      if (hasMsg) { line.classList.add(priority, 'active'); }
    }
    if (dot) {
      dot.setAttribute('opacity', hasMsg ? '1' : '0');
      dot.classList.remove('urgent', 'normal');
      if (hasMsg) dot.classList.add(priority);
    }
  });
}

// ── Executive Briefing panel ──────────────────────────────────────
function renderBriefing(briefing) {
  const pill = document.getElementById('overall-pill');
  const body = document.getElementById('briefing-body');
  if (!briefing) {
    pill.textContent = 'NO DATA';
    pill.className = 'unknown';
    body.innerHTML = '<span class="brief-text">Briefing unavailable.</span>';
    return;
  }
  const raw = (briefing.overall_status || 'unknown').toLowerCase();
  const pillClass = raw.includes('healthy') ? 'healthy' : raw.includes('critical') ? 'critical' : raw.includes('stale') ? 'stale' : 'unknown';
  pill.textContent = (briefing.overall_status || 'UNKNOWN').toUpperCase();
  pill.className = pillClass;

  const items = (briefing.briefs || []).slice(0, 4);
  body.innerHTML = items.map(b => {
    const lines = (b.insight || '').split('\n').filter(l => l.trim());
    let raw = lines[0] || '';
    if (raw.length < 40 && lines.length > 1) raw = lines.slice(0, 2).join(' ');
    if (raw.length > 180) raw = raw.slice(0, 180).replace(/\s+\S*$/, '') + '...';
    const text = raw.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    return `<div class="brief-item"><span class="brief-agent">${b.label}: </span><span class="brief-text">${text}</span></div>`;
  }).join('') + (briefing.top_action
    ? `<div class="brief-action">Recommended next step: ${briefing.top_action}</div>` : '');
}

// ── Level 2: Lessons panel (replaces ticker) ──────────────────────
function updateLessonsPanel(reflections) {
  const panel = document.getElementById('lessons-panel');
  const items = (reflections?.reflections || []).filter(r => r.lesson).slice(-4);
  if (!items.length) { panel.innerHTML = ''; return; }
  panel.innerHTML = '<h3>What Your Agents Learned</h3>' + items.map(r => {
    const lesson = (r.lesson || '').replace(/\*(.+?)\*/g, '<em>$1</em>');
    return `<div class="lesson-item"><span class="lesson-agent">${r.agent.toUpperCase()}</span><span class="lesson-text"> learned: ${lesson}</span></div>`;
  }).join('');
}

// ── Level 3: Task queue panel ────────────────────────────────────
function updateTaskPanel(msgData) {
  const panel = document.getElementById('task-panel');
  const tasks = msgData?.tasks || [];
  if (!tasks.length) { panel.innerHTML = ''; return; }
  panel.innerHTML = '<h3>Task Queue</h3>' + tasks.map(t => {
    const pClass = t.priority <= 2 ? 'p1' : t.priority <= 4 ? 'p3' : '';
    const sClass = t.status === 'done' ? 'done' : 'pending';
    return `<div class="task-row">
      <span class="task-priority ${pClass}">P${t.priority}</span>
      <span class="task-agent">${t.assigned_to.toUpperCase()}</span>
      <span class="task-text">${t.task.slice(0, 60)}</span>
      <span class="task-status ${sClass}">${t.status}</span>
    </div>`;
  }).join('');
}

// ── Pulse animation via requestAnimationFrame ─────────────────────
const pulseState = {};

function animatePulses() {
  const now = performance.now();
  EDGES.forEach(([srcId, tgtId, agentId], i) => {
    const dot = svg.querySelector(`.pulse-dot[data-idx="${i}"]`);
    if (!dot || !dot.classList.contains('active')) return;

    const src = AGENTS[srcId] || SYSTEMS[srcId];
    const tgt = AGENTS[tgtId] || SYSTEMS[tgtId];
    const duration = 2000;
    if (!pulseState[i]) pulseState[i] = now;
    const t = ((now - pulseState[i]) % duration) / duration;

    const x1 = cx(src), y1 = cy(src), x2 = cx(tgt), y2 = cy(tgt);
    const mx = (x1 + x2) / 2;
    const my = (y1 + y2) / 2;

    // Quadratic bezier interpolation (two segments)
    let px, py;
    if (t < 0.5) {
      const s = t * 2;
      const a = 1 - s;
      px = a * a * x1 + 2 * a * s * mx + s * s * mx;
      py = a * a * y1 + 2 * a * s * y1 + s * s * my;
    } else {
      const s = (t - 0.5) * 2;
      const a = 1 - s;
      px = a * a * mx + 2 * a * s * mx + s * s * x2;
      py = a * a * my + 2 * a * s * y2 + s * s * y2;
    }
    dot.setAttribute('cx', px);
    dot.setAttribute('cy', py);
  });
  // Animate message edge dots
  MSG_EDGES.forEach(([srcId, tgtId], i) => {
    const dot = svg.querySelector(`.msg-dot[data-msg-idx="${i}"]`);
    if (!dot || dot.getAttribute('opacity') === '0') return;
    const src = AGENTS[srcId], tgt = AGENTS[tgtId];
    const duration = 1500;
    const key = 'msg_' + i;
    if (!pulseState[key]) pulseState[key] = now;
    const t = ((now - pulseState[key]) % duration) / duration;
    const x1 = cx(src), y1 = cy(src), x2 = cx(tgt), y2 = cy(tgt);
    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
    let px, py;
    if (t < 0.5) {
      const s = t * 2, a = 1 - s;
      px = a*a*x1 + 2*a*s*mx + s*s*mx;
      py = a*a*y1 + 2*a*s*y1 + s*s*my;
    } else {
      const s = (t-0.5)*2, a = 1 - s;
      px = a*a*mx + 2*a*s*mx + s*s*x2;
      py = a*a*my + 2*a*s*y2 + s*s*y2;
    }
    dot.setAttribute('cx', px);
    dot.setAttribute('cy', py);
  });
  requestAnimationFrame(animatePulses);
}

// ── Update diagram from data ──────────────────────────────────────
function updateDiagram(data) {
  for (const [id, agent] of Object.entries(data.agents)) {
    const rect = svg.querySelector(`.agent-rect[data-agent="${id}"]`);
    if (!rect) continue;
    rect.classList.remove('healthy', 'stale', 'critical', 'never', 'no_data');
    rect.classList.add(agent.status);

    const group = rect.parentElement;
    group.classList.remove('glow-green', 'glow-amber', 'glow-red');
    if (agent.status === 'healthy') group.classList.add('glow-green');
    else if (agent.status === 'stale') group.classList.add('glow-amber');
    else if (agent.status === 'critical') group.classList.add('glow-red');
  }

  // Activate/deactivate edges
  EDGES.forEach(([, , agentId], i) => {
    const status = data.agents[agentId]?.status || 'never';
    const active = status === 'healthy';
    const line = svg.querySelector(`.edge-line[data-idx="${i}"]`);
    const dot = svg.querySelector(`.pulse-dot[data-idx="${i}"]`);
    if (line) { line.classList.toggle('active', active); }
    if (dot) {
      dot.classList.remove('healthy', 'stale', 'critical');
      dot.classList.toggle('active', active);
      if (active) dot.classList.add(status);
    }
  });
}

// ── Status cards ──────────────────────────────────────────────────
function renderStatusCards(data) {
  const container = document.getElementById('cards');
  container.innerHTML = '';
  for (const [id, label] of Object.entries(AGENT_NAMES)) {
    const a = data.agents[id] || { status: 'no_data' };
    const card = document.createElement('div');
    card.className = 'card';

    let hoursStr = '-';
    if (a.hours_ago != null) {
      hoursStr = a.hours_ago < 1 ? `${Math.round(a.hours_ago * 60)}m ago` :
                 a.hours_ago < 24 ? `${a.hours_ago.toFixed(1)}h ago` :
                 `${Math.round(a.hours_ago / 24)}d ago`;
    }

    // Level 1: trend info
    const t = latestTrends?.[id];
    const trendSymbol = t ? (t.trend === 'up' ? ' \u2191' : t.trend === 'down' ? ' \u2193' : ' \u2192') : '';
    const recurringCount = t?.recurring?.length || 0;

    // Level 2: accuracy
    const acc = latestReflections?.accuracy?.[id];
    const accStr = acc ? `${Math.round(acc.avg * 100)}%` : '-';

    const rows = [
      ['Last run', hoursStr],
      ['Issues found', `${a.finding_count ?? '-'}${trendSymbol}`],
    ];
    if (a.critical_count > 0) rows.push(['Critical', a.critical_count]);
    if (a.warn_count > 0) rows.push(['Warnings', a.warn_count]);
    if (recurringCount > 0) rows.push(['Repeat issues', `${recurringCount}`]);
    rows.push(['Self-score', accStr]);
    if (a.last_action) rows.push(['Action', a.last_action.slice(0, 40)]);

    let insight = a.ai_insight ? a.ai_insight.slice(0, 200) + (a.ai_insight.length > 200 ? '...' : '') : '';
    insight = insight.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    const rowsHtml = rows.map(([l, v]) => {
      const titleAttr = l === 'Self-score' ? ' title="How accurately the agent rates its own assessments"' : '';
      return `<div class="card-row"><span class="label"${titleAttr}>${l}</span><span class="value">${v}</span></div>`;
    }).join('');

    card.innerHTML = `
      <div class="card-head">
        <span class="card-title">${label}</span>
        <span class="card-badge badge-${a.status}">${a.status.toUpperCase()}</span>
      </div>
      ${rowsHtml}
      ${insight ? `<div class="card-insight">"${insight}"</div>` : ''}
    `;
    container.appendChild(card);
  }
}

// ── Pipeline bar ──────────────────────────────────────────────────
function renderPipelineBar(data) {
  const p = data.pipeline;
  document.getElementById('pipeline-bar').innerHTML = [
    `<span class="pipe-stat">Leads in CRM: <span>${p.leads_total}</span></span>`,
    `<span class="pipe-stat">Posts ready: <span>${p.social_pending}</span></span>`,
    `<span class="pipe-stat">Published this week: <span>${p.social_posted_7d}</span></span>`,
    `<span class="pipe-stat">Sales this week: <span>${p.funnel_purchases_7d || 0}</span></span>`,
  ].join('');
}

// ── Tooltip ───────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function showTooltip(e, agentId) {
  if (!latestData) return;
  const a = latestData.agents[agentId];
  if (!a) return;
  document.getElementById('tip-agent').textContent = AGENT_NAMES[agentId];

  const hoursStr = a.hours_ago != null
    ? (a.hours_ago < 1 ? `${Math.round(a.hours_ago * 60)} minutes ago` : `${a.hours_ago.toFixed(1)} hours ago`)
    : 'never';

  const lines = [`Status: ${a.status}`, `Last run: ${hoursStr}`];
  if (a.finding_count != null) lines.push(`Findings: ${a.finding_count}`);
  if (a.critical_count > 0) lines.push(`Critical: ${a.critical_count}`);
  if (a.warn_count > 0) lines.push(`Warnings: ${a.warn_count}`);
  if (a.last_action) lines.push(`Last action: ${a.last_action}`);
  if (a.note) lines.push(a.note);
  document.getElementById('tip-meta').innerHTML = lines.join('<br>');

  const insight = a.ai_insight || '';
  const tipInsight = document.getElementById('tip-insight');
  if (insight) {
    const trimmed = insight.length > 180 ? insight.slice(0, 180) + '...' : insight;
    tipInsight.innerHTML = `"${trimmed.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')}"`;
  } else {
    tipInsight.textContent = '';
  }

  tooltip.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const x = e.clientX + 14;
  tooltip.style.left = (x + tooltip.offsetWidth > window.innerWidth - 20)
    ? `${e.clientX - tooltip.offsetWidth - 14}px` : `${x}px`;
  tooltip.style.top = `${e.clientY - 10}px`;
}

function hideTooltip() { tooltip.style.display = 'none'; }

// ── Polling ───────────────────────────────────────────────────────
async function fetchStatus() {
  try {
    const [statusRes, trendsRes, reflRes, msgRes, briefRes] = await Promise.all([
      fetch('/api/status'),
      fetch('/api/trends').catch(() => null),
      fetch('/api/reflections').catch(() => null),
      fetch('/api/messages').catch(() => null),
      fetch('/api/briefing').catch(() => null),
    ]);
    if (!statusRes.ok) throw new Error(`HTTP ${statusRes.status}`);
    const data = await statusRes.json();
    latestData = data;
    latestTrends = trendsRes?.ok ? await trendsRes.json() : null;
    latestReflections = reflRes?.ok ? await reflRes.json() : null;
    latestMessages = msgRes?.ok ? await msgRes.json() : null;
    latestBriefing = briefRes?.ok ? await briefRes.json() : null;

    updateDiagram(data);
    renderStatusCards(data);
    renderPipelineBar(data);
    renderBriefing(latestBriefing);
    updateTrendOverlays(latestTrends);
    updateAccuracyGauges(latestReflections);
    updateMessageOverlays(latestMessages);
    updateLessonsPanel(latestReflections);
    updateTaskPanel(latestMessages);
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date(data.timestamp).toLocaleTimeString();
  } catch (err) {
    document.getElementById('last-updated').textContent = 'Poll failed - retrying...';
  }
}

// ── Init ──────────────────────────────────────────────────────────
renderMsgEdges();
renderEdges();
renderNodes();
animatePulses();
fetchStatus();
setInterval(fetchStatus, 10000);
</script>
